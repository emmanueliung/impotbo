# =============================================================
# nginx.conf — Configuration Nginx pour ImpotBO
# =============================================================
# Emplacement sur le VPS :
#   /etc/nginx/sites-available/impotbo
#
# Activer avec :
#   sudo ln -s /etc/nginx/sites-available/impotbo \
#              /etc/nginx/sites-enabled/impotbo
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================

# ── Redirection HTTP → HTTPS ──────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name votre-domaine.com www.votre-domaine.com;

    # Let's Encrypt challenge (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Rediriger tout le reste vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Serveur HTTPS principal ───────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name votre-domaine.com www.votre-domaine.com;

    # ── Certificats SSL (générer avec Certbot) ────────────
    # sudo certbot --nginx -d votre-domaine.com -d www.votre-domaine.com
    ssl_certificate     /etc/letsencrypt/live/votre-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votre-domaine.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/votre-domaine.com/chain.pem;

    # ── Sécurité SSL ──────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── En-têtes de sécurité ──────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Logs ──────────────────────────────────────────────
    access_log /var/log/nginx/impotbo-access.log;
    error_log  /var/log/nginx/impotbo-error.log;

    # ── Taille max des uploads ────────────────────────────
    client_max_body_size 10M;

    # ── API Backend (proxy vers Express) ──────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Headers nécessaires pour Express
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Pas de cache pour l'API
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Frontend React (fichiers statiques) ───────────────
    location / {
        root /var/www/impotbo/frontend/dist;
        index index.html;

        # SPA — Toujours retourner index.html pour le routing React
        try_files $uri $uri/ /index.html;

        # Cache pour les assets avec hash dans le nom
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Pas de cache pour index.html
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Sécurité — Bloquer les fichiers sensibles ─────────
    location ~ /\.env {
        deny all;
        return 404;
    }

    location ~ /\.git {
        deny all;
        return 404;
    }
}
